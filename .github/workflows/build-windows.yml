name: Build Windows Installer

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build, Test, Package
    runs-on: windows-latest

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      Configuration: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore PharmacySaas.sln

      - name: Build solution
        run: dotnet build PharmacySaas.sln -c Release --no-restore

      - name: Run tests
        run: dotnet test PharmacySaas.sln -c Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Publish PMS.Desktop (self-contained, single-file)
        shell: pwsh
        run: |
          dotnet publish src/PMS.Desktop/PMS.Desktop.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -o publish/desktop

      - name: Publish PMS.Api
        shell: pwsh
        run: |
          dotnet publish src/PMS.Api/PMS.Api.csproj `
            -c Release `
            -o publish/api

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Read version
        id: ver
        shell: pwsh
        run: |
          $xml = [xml](Get-Content Directory.Build.props)
          $version = $xml.Project.PropertyGroup.Version
          if (-not $version) { $version = "0.1.0" }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $version"

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) { $iscc = "$env:ProgramFiles\Inno Setup 6\ISCC.exe" }
          & $iscc /DAppVersion=${{ steps.ver.outputs.version }} installer/PMS.Setup.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: List installer output
        shell: pwsh
        run: Get-ChildItem installer/Output -Recurse | Format-Table Name,Length

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: PharmacySaas-Setup-${{ steps.ver.outputs.version }}
          path: installer/Output/*.exe
          if-no-files-found: error

      - name: Upload portable build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PharmacySaas-Portable-${{ steps.ver.outputs.version }}
          path: publish/desktop/**

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/*.trx'

      - name: Attach to GitHub Release (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/*.exe
          generate_release_notes: true
